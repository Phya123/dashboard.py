[server]
headless = true
port = 8501
enableCORS = false
enableXsrfProtection = false
maxUploadSize = 200
runOnSave = true

[client]
showErrorDetails = true
toolbarMode = "minimal"

[logger]
level = "info"

[theme]
primaryColor = "#4F46E5"
backgroundColor = "#0F172A"
secondaryBackgroundColor = "#111827"
textColor = "#F8FAFC"
font = "sans serif"

# ==========================================
# Performance Optimization Settings (Added)
# ==========================================
#
# Session State Persistence:
# - Session state is automatically persisted within a browser session
# - Dashboard uses time-based TTL caching to avoid redundant API calls
# - See dashboard.py for cache configuration
#
# Keep-Alive Configuration:
# - Deploy keep_alive.py to prevent server sleep on cloud platforms
# - Supported platforms: Render, Heroku, AWS, Docker
# - See OPTIMIZATION_GUIDE.md for deployment instructions
